aid: nookal
url: https://raw.githubusercontent.com/api-evangelist/nookal/refs/heads/main/apis.yml
name: Nookal
kind: company
description: Nookal is Australian-built practice management software for allied health
  clinics - physiotherapy, chiropractic, podiatry, psychology, and similar disciplines
  - covering online bookings, multi-practitioner scheduling, patient and case records,
  treatment notes, invoicing, bulk billing, and clinic reporting. Nookal exposes a
  documented REST API at https://api.nookal.com/production/v2/ that lets integrators
  read and write patients, cases, appointments, class bookings, availabilities,
  practitioners, locations, treatment notes, files, and invoices. The API is
  authenticated with an account-issued API key and returns JSON. API access is
  available on the paid Professional and Enterprise plans.
image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
tags:
- Practice Management
- Healthcare
- Allied Health
- Appointments
- Scheduling
- Patients
- Clinics
- Bookings
- Physiotherapy
- SaaS
