description: >-
  FinOps view of Nookal spend. Nookal is a per-practitioner monthly SaaS
  subscription: the dominant cost is the number of active practitioner seats
  times the plan rate (Essentials, Professional, or Enterprise), billed monthly.
  API access is not a separately metered product - it is a feature gated to the
  Professional and Enterprise tiers, so the API carries no per-call invoice line
  of its own. Variable, usage-metered costs sit alongside the seat fee: SMS
  messaging (from around 10 cents per message), Medicare claiming (around 30 cents
  per successful claim), and optional add-ons (AI + Voice, Patient Portal, Single
  Sign-On, Secure Messaging) billed per licence, location, or user. This model is
  modeled honestly from the public pricing page and is not reconciled against a
  Nookal invoice or FOCUS export.
notes: >-
  Per-unit rates and add-on prices were read from the Nookal pricing page on
  2026-07-12 and may change; verify during reconciliation. Nookal does not publish
  a FOCUS-formatted billing export, so the meters below are modeled cost drivers,
  not columns from an actual invoice. The API's cost is entirely indirect - it is
  the price of holding a Professional-or-above seat - so integration spend is
  governed by seat count and by the usage-metered SMS/Medicare/add-on lines the
  integration triggers.
