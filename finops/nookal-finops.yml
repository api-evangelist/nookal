meters:
- name: practitioner_seats
  description: Active practitioner seats billed per month at the plan rate; the primary Nookal cost driver.
  unit: seats
  aggregation: sum
  dimensions:
  - account
  - plan
  - location
- name: sms_messages
  description: SMS reminders and two-way messages, metered per message on top of the seat fee.
  unit: messages
  aggregation: sum
  dimensions:
  - account
  - location
- name: medicare_claims
  description: Medicare / bulk-billing claims submitted, metered per successful claim.
  unit: claims
  aggregation: sum
  dimensions:
  - account
  - location
- name: addons
  description: Optional add-ons (AI + Voice, Patient Portal, SSO, Secure Messaging) billed per licence, location, or user.
  unit: licences
  aggregation: sum
  dimensions:
  - account
  - addon
principles:
- name: Visibility
  description: Track active practitioner seats per plan and location, plus usage-metered SMS and Medicare lines, to see the full monthly Nookal cost.
- name: Allocation
  description: Map seats, add-ons, and per-location usage to clinics or cost centers; the API's cost is the Professional-or-above seat it rides on.
- name: Optimization
  description: Right-size the plan tier to the features actually used, deactivate unused practitioner seats promptly, and batch SMS/Medicare-triggering automation to control the metered lines your integration drives.
- name: Accountability
  description: Assign an owner per clinic account to review the monthly seat count, add-ons, and usage-metered charges against budget.
