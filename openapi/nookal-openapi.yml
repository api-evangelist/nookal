openapi: 3.0.3
info:
  title: Nookal API
  description: >-
    REST API for Nookal, Australian-built practice management software for allied
    health clinics. The API exposes patients, cases, treatment notes, files,
    appointments, class bookings, availabilities, clinic reference data
    (locations, practitioners, appointment/class types, stock), and invoices.


    Base URL: https://api.nookal.com/production/v2/. All requests are authenticated
    with an account-issued API key passed as the `api_key` parameter (query string
    for GET requests, form field for POST requests). Responses are JSON using a
    common envelope: `{"status":"success"|"failure","data":{...},"details":{...}}`.
    On failure, `details` carries `errorMessage`, `errorCode`, and an `alerts`
    array. Read endpoints are paginated via `page` and `page_length`, and the
    response `details` object reports `totalItems`, `currentItems`, `currentPage`,
    and `nextPage`.


    Endpoint paths, methods, and parameters are grounded in Nookal's public API
    reference (https://api.nookal.com/dev). The `verify`, `getLocations`, and
    `getPatients` surfaces were confirmed live against the production host; the
    `api_key` requirement is confirmed by live probes. Request and response
    body schemas below are MODELED from the documented object reference and the
    live JSON envelope, not copied from a machine-readable Nookal specification
    (Nookal does not publish one), so field-level shapes should be verified
    against a live account before production use.
  version: 'v2'
  contact:
    name: Nookal
    url: https://www.nookal.com
  termsOfService: https://www.nookal.com/terms
servers:
  - url: https://api.nookal.com/production/v2
    description: Nookal production API (v2)
security:
  - apiKeyQuery: []
tags:
  - name: Verification
    description: Verify that an API key is valid and connected to a Nookal account.
  - name: Clinic
    description: Clinic reference data - locations, practitioners, and item/type lists.
  - name: Patients
    description: Patient records, cases, treatment notes, and patient files.
  - name: Appointments
    description: Appointments, class bookings, availabilities, and the waiting list.
  - name: Invoices
    description: Invoices and their items, payments, credits, discounts, and refunds.
paths:
  /verify:
    get:
      operationId: verify
      tags:
        - Verification
      summary: Verify API key
      description: >-
        Verifies that the supplied API key is valid and connected to a Nookal
        account. Confirmed live: without an api_key the endpoint returns a
        failure envelope with errorCode "L000_1" and alert "Missing variable:
        api_key".
      responses:
        '200':
          description: A status envelope indicating whether the key verified.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Envelope'
  /getLocations:
    get:
      operationId: getLocations
      tags:
        - Clinic
      summary: Get locations
      description: Retrieves the clinic locations for the account. Confirmed live.
      parameters:
        - $ref: '#/components/parameters/LastModified'
      responses:
        '200':
          description: A status envelope whose data contains the list of locations.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Envelope'
  /getLocationLogo:
    get:
      operationId: getLocationLogo
      tags:
        - Clinic
      summary: Get location logo
      parameters:
        - name: location_id
          in: query
          required: true
          schema:
            type: string
      responses:
        '200':
          description: A status envelope containing the location logo reference.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Envelope'
  /getPractitioners:
    get:
      operationId: getPractitioners
      tags:
        - Clinic
      summary: Get practitioners
      parameters:
        - $ref: '#/components/parameters/LastModified'
        - name: include_inactive_practitioners
          in: query
          required: false
          schema:
            type: boolean
      responses:
        '200':
          description: A status envelope whose data contains the list of practitioners.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Envelope'
  /getPractitionerPhoto:
    get:
      operationId: getPractitionerPhoto
      tags:
        - Clinic
      summary: Get practitioner photo
      parameters:
        - name: practitioner_id
          in: query
          required: true
          schema:
            type: string
      responses:
        '200':
          description: A status envelope containing the practitioner photo reference.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Envelope'
  /getAppointmentTypes:
    get:
      operationId: getAppointmentTypes
      tags:
        - Clinic
      summary: Get appointment types
      responses:
        '200':
          description: A status envelope whose data contains appointment types.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Envelope'
  /getClassTypes:
    get:
      operationId: getClassTypes
      tags:
        - Clinic
      summary: Get class types
      responses:
        '200':
          description: A status envelope whose data contains class types.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Envelope'
  /getStockList:
    get:
      operationId: getStockList
      tags:
        - Clinic
      summary: Get stock list
      responses:
        '200':
          description: A status envelope whose data contains the stock list.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Envelope'
  /getPatients:
    get:
      operationId: getPatients
      tags:
        - Patients
      summary: Get patients
      description: >-
        Lists patients in the account. Confirmed live (requires api_key).
        Supports pagination and a last_modified incremental filter.
      parameters:
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/PageLength'
        - $ref: '#/components/parameters/LastModified'
        - name: deceased
          in: query
          required: false
          schema:
            type: boolean
      responses:
        '200':
          description: A status envelope whose data contains a page of patients.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Envelope'
  /searchPatients:
    get:
      operationId: searchPatients
      tags:
        - Patients
      summary: Search patients
      description: >-
        Searches patients by one of several criteria - patient_id, online_code,
        date_created, an email + name + date-of-birth combination, or a fuzzy
        name search.
      parameters:
        - name: patient_id
          in: query
          required: false
          schema:
            type: string
        - name: online_code
          in: query
          required: false
          schema:
            type: string
        - name: email
          in: query
          required: false
          schema:
            type: string
        - name: first_name
          in: query
          required: false
          schema:
            type: string
        - name: last_name
          in: query
          required: false
          schema:
            type: string
        - name: date_of_birth
          in: query
          required: false
          schema:
            type: string
            format: date
        - name: fuzzy_search
          in: query
          required: false
          schema:
            type: boolean
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/PageLength'
        - name: deceased
          in: query
          required: false
          schema:
            type: boolean
      responses:
        '200':
          description: A status envelope whose data contains matching patients.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Envelope'
  /getCases:
    get:
      operationId: getCases
      tags:
        - Patients
      summary: Get cases for a patient
      parameters:
        - name: patient_id
          in: query
          required: true
          schema:
            type: string
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/PageLength'
        - $ref: '#/components/parameters/LastModified'
      responses:
        '200':
          description: A status envelope whose data contains the patient's cases.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Envelope'
  /getAllCases:
    get:
      operationId: getAllCases
      tags:
        - Patients
      summary: Get all cases
      parameters:
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/PageLength'
        - $ref: '#/components/parameters/LastModified'
      responses:
        '200':
          description: A status envelope whose data contains cases across patients.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Envelope'
  /addPatient:
    post:
      operationId: addPatient
      tags:
        - Patients
      summary: Add a patient
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/AddPatientRequest'
      responses:
        '200':
          description: A status envelope containing the created patient.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Envelope'
  /editPatient:
    post:
      operationId: editPatient
      tags:
        - Patients
      summary: Edit a patient
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              required:
                - api_key
                - patient_id
              properties:
                api_key:
                  type: string
                patient_id:
                  type: string
                first_name:
                  type: string
                last_name:
                  type: string
                nickname:
                  type: string
                email:
                  type: string
                date_of_birth:
                  type: string
                  format: date
                notes:
                  type: string
                status:
                  type: string
      responses:
        '200':
          description: A status envelope containing the updated patient.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Envelope'
  /getTreatmentNotes:
    get:
      operationId: getTreatmentNotes
      tags:
