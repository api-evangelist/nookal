components:
  securitySchemes:
    apiKeyQuery:
      type: apiKey
      in: query
      name: api_key
      description: >-
        Account-issued API key created in the Nookal application under Setup /
        Integrations, with a configurable access level. Passed as the `api_key`
        parameter - in the query string for GET requests and as a form field for
        POST requests. Confirmed live: omitting it returns a failure envelope
        with alert "Missing variable: api_key".
  parameters:
    Page:
      name: page
      in: query
      required: false
      description: Page number for paginated results.
      schema:
        type: integer
        default: 1
    PageLength:
      name: page_length
      in: query
      required: false
      description: Number of items per page.
      schema:
        type: integer
        default: 100
    LastModified:
      name: last_modified
      in: query
      required: false
      description: Return only records modified after this timestamp (incremental sync).
      schema:
        type: string
  schemas:
    Envelope:
      type: object
      description: >-
        Standard Nookal JSON response envelope. On success, status is "success"
        and data carries the results object; on failure, status is "failure" and
        details carries errorMessage, errorCode, and alerts. Shape confirmed live
        against the verify and getLocations endpoints.
      properties:
        status:
          type: string
          enum:
            - success
            - failure
        data:
          type: object
          additionalProperties: true
          description: Result payload on success (structure varies per endpoint).
        details:
          $ref: '#/components/schemas/Details'
    Details:
      type: object
      properties:
        errorMessage:
          type: string
        errorCode:
          type: string
        alerts:
          type: array
          items:
            type: string
        totalItems:
          type: integer
        currentItems:
          type: integer
        currentPage:
          type: integer
        nextPage:
          type: integer
        pageLength:
          type: integer
    AddPatientRequest:
      type: object
      required:
        - api_key
        - first_name
        - last_name
        - date_of_birth
      properties:
        api_key:
          type: string
        first_name:
          type: string
        last_name:
          type: string
        date_of_birth:
          type: string
          format: date
        email:
          type: string
        client_notes:
          type: string
        alert_notes:
          type: string
